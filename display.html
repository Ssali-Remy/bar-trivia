<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamaduni Trivia — Big Screen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body class="min-h-screen scanlines overflow-hidden">

  <!-- ============ LOBBY: giant QR + roster ============ -->
  <section id="view-lobby" class="hidden min-h-screen flex flex-col items-center justify-center p-8 text-center">
    <div class="tamaduni-logo justify-center mb-2 anim-flicker" style="font-size:5rem">
      <span class="tl-word">TAMA<br>DUNI</span>
      <span class="tl-hub" style="font-size:1.5rem">HUB</span>
    </div>
    <p class="text-2xl neon-blue uppercase tracking-widest mb-8">Scan to join · Grab a drink · Get ready</p>
    <div id="qrcode" class="mb-8"></div>
    <p class="text-xl font-bold mb-6" style="color:var(--ink-dim)">or go to <span id="join-url" class="neon-green"></span></p>
    <div id="lobby-roster" class="flex flex-wrap justify-center gap-3 max-w-4xl"></div>
  </section>

  <!-- ============ QUESTION ============ -->
  <section id="view-question" class="hidden min-h-screen flex flex-col p-10">
    <header class="flex items-start justify-between mb-6">
      <div>
        <p id="dq-round" class="text-2xl font-black neon-blue uppercase tracking-widest"></p>
        <p id="dq-meta" class="text-lg" style="color:var(--ink-dim)"></p>
      </div>
      <div id="dq-timer" class="text-8xl font-black neon-green tabular-nums leading-none">30</div>
    </header>

    <h2 id="dq-text" class="text-4xl xl:text-6xl font-black leading-tight mb-10 anim-slide-up"></h2>

    <div id="dq-options" class="grid grid-cols-2 gap-6 flex-1 content-start">
      <!-- option cards injected -->
    </div>

    <footer class="mt-6 text-center">
      <p id="dq-status" class="text-2xl font-bold neon-pink"></p>
      <p id="dq-answercount" class="text-lg mt-1" style="color:var(--ink-dim)"></p>
    </footer>
  </section>

  <!-- ============ LEADERBOARD ============ -->
  <section id="view-leaderboard" class="hidden min-h-screen flex flex-col items-center p-10">
    <h2 id="lb-title" class="text-5xl xl:text-6xl font-black neon-gold anim-pulse mb-10">LEADERBOARD</h2>
    <div id="lb-rows" class="w-full max-w-4xl space-y-4 relative"></div>
  </section>

  <!-- ============ SUDDEN DEATH ============ -->
  <section id="view-sd" class="hidden min-h-screen flex flex-col items-center justify-center p-10 text-center">
    <h2 class="text-7xl font-black neon-red anim-pulse mb-8">⚡ SUDDEN DEATH ⚡</h2>
    <p id="sd-display-text" class="text-4xl font-black leading-tight max-w-5xl mb-10"></p>
    <div id="sd-display-timer" class="text-9xl font-black neon-green tabular-nums">60</div>
    <p id="sd-display-status" class="text-2xl neon-blue mt-6"></p>
  </section>

  <!-- ============ WINNER ============ -->
  <section id="view-winner" class="hidden min-h-screen flex flex-col items-center justify-center p-10 text-center">
    <div class="text-8xl mb-6 anim-fire">🏆</div>
    <h2 class="text-4xl neon-blue uppercase tracking-widest mb-4">Your champions</h2>
    <p id="winner-name" class="text-7xl xl:text-9xl font-black neon-gold anim-pulse mb-6"></p>
    <p id="winner-score" class="text-3xl font-bold neon-green"></p>
    <div id="winner-podium" class="w-full max-w-3xl mt-12 space-y-3"></div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/core.js"></script>
  <script src="js/display.js"></script>
</body>
</html>
